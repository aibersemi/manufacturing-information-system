name: MIS CodeQL Config

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - .

paths-ignore:
  - .github/agents
  - .github/instructions
  - .github/prompts
  - .github/skills
  - .github/copilot-instructions.md
  - frontend/dist
  - frontend/src/api/generated
  - node_modules
  - .venv
  - staticfiles
