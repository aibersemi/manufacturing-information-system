name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: manufacturing_is
          POSTGRES_USER: mis_app
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mis_app -d manufacturing_is"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.15
        env:
          MEILI_NO_ANALYTICS: "true"
        ports:
          - 7700:7700

    env:
      SECRET_KEY: ci-secret-key-only
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8015,http://localhost:8016
      CORS_ALLOWED_ORIGINS: http://localhost:8015
      DB_NAME: manufacturing_is
      DB_USER: mis_app
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      REDIS_URL: redis://127.0.0.1:6379
      REDIS_BROKER_URL: redis://127.0.0.1:6379/0
      REDIS_RUNTIME_URL: redis://127.0.0.1:6379/1
      MEILISEARCH_URL: http://127.0.0.1:7700
      MEILISEARCH_API_KEY: ""
      PUBLIC_FRONTEND_URL: http://localhost:8015
      PUBLIC_API_URL: http://localhost:8016
      PUBLIC_API_WS_URL: ws://localhost:8016

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check

      - name: Wait for Meilisearch
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:7700/health; then
              exit 0
            fi
            echo "Menunggu Meilisearch (${attempt}/30)"
            sleep 1
          done
          exit 1

      - name: Pytest
        run: python -m pytest --testmon --reuse-db
