name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      VITE_API_BASE_URL: http://localhost:8016
      VITE_PUBLIC_FRONTEND_URL: http://localhost:8015

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Paraglide
        run: |
          npx paraglide-js compile --project ./frontend/project.inlang --outdir ./frontend/src/paraglide --emit-ts-declarations --silent
          npm run paraglide:security-patch

      - name: Biome
        run: npx @biomejs/biome check .

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test:frontend

      - name: Build
        run: npm run build
