name: Bug report
description: Laporkan regresi, error, atau perilaku MIS yang tidak sesuai.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Jangan sertakan secret, password, token, DSN lengkap, IP internal, domain internal, atau data produksi.
  - type: dropdown
    id: area
    attributes:
      label: Impacted area
      options:
        - Backend/API
        - Frontend/UI
        - Database/Migration
        - Authentication/RBAC
        - Inventory
        - Production
        - Sales
        - Finance/Accounting
        - Labor
        - Documentation
        - Operations
        - Tidak yakin
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: Jelaskan perilaku yang salah secara singkat.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Gunakan data contoh atau placeholder non-sensitif.
      placeholder: |
        1. Buka ...
        2. Klik ...
        3. Isi ...
        4. Terlihat ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Business or operational impact
      description: Jelaskan dampak ke produksi, stok, approval, invoice, audit, atau workflow lain.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Non-sensitive evidence
      description: Tempel error message, screenshot yang sudah disensor, atau log tanpa data privat.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Branch or commit
      placeholder: main, nama branch, atau SHA jika tersedia
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Security check
      options:
        - label: Saya tidak menyertakan secret, credential, DSN lengkap, IP internal, domain internal, atau data produksi.
          required: true
